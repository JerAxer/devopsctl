# devopsctl - Main Configuration File
# --------------------------------------
PROJECT_DIR="/var/www/myapp"
BACKUP_DIR="/var/backups/devopsctl"
LOG_DIR="./logs"
LOG_FILE="${LOG_DIR}/devopsctl.log"

# System Thresholds (for alerts)
ALERT_CPU=80          # Percentage
ALERT_RAM=80          # Percentage
ALERT_DISK=85         # Percentage

# Security
DISABLE_ROOT_SSH="no"  # Set to "yes" to harden
FIREWALL_PORTS="22,80,443"

# Deployment
REPO_URL=""            # Set your Git repo here
APP_TYPE="node"        # Options: node, python, static

# Safe Mode (set to "true" to require --force for destructive ops)
SAFE_MODE="true"

# ========================
# MULTI-SERVER CONFIG
# ========================
# Comma-separated list of servers (user@ip_or_hostname)
# Requires SSH key-based authentication (passwordless)
SERVERS_LIST="root@192.168.1.101,root@192.168.1.102,ubuntu@staging-server"

# Timeout in seconds for remote commands
SSH_TIMEOUT=30